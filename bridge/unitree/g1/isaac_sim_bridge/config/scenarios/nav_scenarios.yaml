# Sim-to-Sim validation scenarios for G1 obstacle navigation.
# Each scenario defines start/goal/obstacles and expected outcomes.

scenarios:
  straight_line:
    description: "Navigate straight with no obstacles"
    start: [0.0, 0.0]
    goal: [5.0, 0.0]
    obstacles: []
    expected:
      max_collisions: 0
      min_progress: 0.90
      max_steps: 500

  obstacle_avoidance:
    description: "Navigate around a single obstacle"
    start: [0.0, 0.0]
    goal: [5.0, 5.0]
    obstacles:
      - [2.5, 2.5]
    expected:
      max_collisions: 0
      min_progress: 0.90
      max_steps: 800

  corridor:
    description: "Navigate through a narrow corridor of obstacles"
    start: [0.0, 0.0]
    goal: [8.0, 0.0]
    obstacles:
      - [2.0, 1.5]
      - [2.0, -1.5]
      - [4.0, 1.5]
      - [4.0, -1.5]
      - [6.0, 1.5]
      - [6.0, -1.5]
    expected:
      max_collisions: 1
      min_progress: 0.85
      max_steps: 1000

  multi_step:
    description: "Navigate through waypoints with obstacles"
    start: [0.0, 0.0]
    goal: [10.0, 10.0]
    obstacles:
      - [3.0, 3.0]
      - [5.0, 5.0]
      - [7.0, 7.0]
    expected:
      max_collisions: 0
      min_progress: 0.85
      max_steps: 1000
