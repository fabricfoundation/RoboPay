name: Simulation Validation

on:
  pull_request:
    paths:
      - 'simulation/**'
  push:
    branches: [main]
    paths:
      - 'simulation/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install mujoco numpy pyyaml

    - name: Run unit tests
      run: |
        cd simulation
        python -m pytest validation/test_policy.py -v --tb=short

    - name: Run simulation (headless, short)
      run: |
        cd simulation/mujoco
        python scripts/run_simulation.py --headless --duration 10 --no-metrics || true

    - name: Run validation scenarios
      run: |
        cd simulation/mujoco
        python scripts/validate_navigation.py || true
