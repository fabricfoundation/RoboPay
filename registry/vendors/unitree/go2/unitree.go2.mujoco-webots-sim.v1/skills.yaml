schemaVersion: robot-skills.v1
profileId: unitree.go2.mujoco-webots-sim.v1
skills:
  - skillId: navigate_to
    description: Walk the Go2 to a goal position, planning around the given
      obstacles (A* + pure pursuit + trot gait on the official model).
      Fails, and must not settle, if no collision-free path exists or the
      goal is not reached.
    params:
      goal:
        type: point
        absMax: 15.0
      obstacles:
        type: obstacles
        maxCount: 10
    paymentRequired: true
    limits:
      maxSpeedMps: 0.5   # V_MAX in go2_nav.py; the gait never exceeds this
      timeoutSec: 90     # episode hard cap; timeout returns ACTION_FAILED
