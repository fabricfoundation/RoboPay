schemaVersion: payment-policy.v1
provider: x402
network: eip155:84532
policies:
  - skillId: navigate_to
    required: true
    priceUSDC: "0.002"
    paymentHeader: PAYMENT-SIGNATURE
settlement:
  settleOnStatus: success
  rule: >-
    The relay settles only on results with status "success". Every error
    result (DUPLICATE, UNKNOWN_SKILL, INVALID_PARAMS, WRONG_ROBOT, NO_PATH,
    ACTION_FAILED) must not settle.
